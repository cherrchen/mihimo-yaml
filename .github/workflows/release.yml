name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Export Docker image
        id: package
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          image="ghcr.io/${GITHUB_REPOSITORY}:${version}"
          asset="mihomo-yaml-${version}-linux-amd64.tar.gz"
          docker pull --platform linux/amd64 "${image}"
          docker save "${image}" | gzip -9 > "${asset}"
          sha256sum "${asset}" > "${asset}.sha256"
          echo "asset=${asset}" >> "${GITHUB_OUTPUT}"

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: |
            ${{ steps.package.outputs.asset }}
            ${{ steps.package.outputs.asset }}.sha256
          if-no-files-found: error
          compression-level: 0

  release:
    needs: docker
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: release-assets

      - name: Prepare Docker release notes
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          cat > docker-release-notes.md <<EOF
          ## Docker image

          Pull the image from GitHub Container Registry:

          \`\`\`bash
          docker pull ghcr.io/${GITHUB_REPOSITORY}:${version}
          \`\`\`

          Or download the attached Linux AMD64 archive and load it offline:

          \`\`\`bash
          docker load < mihomo-yaml-${version}-linux-amd64.tar.gz
          \`\`\`
          EOF

      - name: Create GitHub pre-release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          generate_release_notes: true
          body_path: docker-release-notes.md
          files: |
            release-assets/*.tar.gz
            release-assets/*.sha256
          fail_on_unmatched_files: true
